version: "3.4"

services:
  nginx:
    image: nginx:alpine
    container_name: radiora_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - his
      - orthanc

  his:
    build:
      context: ./HIS
      dockerfile: Dockerfile
    container_name: radiora_his
    restart: unless-stopped
    # Port 3002 is internal only now

  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: radiora_orthanc
    restart: unless-stopped
    ports:
      - "4242:4242" # Keep DICOM port public
    # Port 8042 is internal only now
    volumes:
      - ./Orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_db:/var/lib/orthanc/db

volumes:
  orthanc_db:
    driver: local
