version: "3.8"

services:

  # ── HIS (Hospital Information System) ────────────────────────────────────────
  his:
    build:
      context: ./HIS
      dockerfile: Dockerfile
    container_name: radiora_his
    restart: unless-stopped
    ports:
      # Bound to localhost only — system nginx proxies to this
      - "127.0.0.1:3010:3002"

  # ── Orthanc PACS ─────────────────────────────────────────────────────────────
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: radiora_orthanc
    restart: unless-stopped
    ports:
      # HTTP bound to localhost only — system nginx proxies to this
      - "127.0.0.1:8042:8042"
      # DICOM port — public, for modality connections (C-STORE, C-MOVE etc.)
      - "0.0.0.0:4242:4242"
    volumes:
      - ./Orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_db:/var/lib/orthanc/db

volumes:
  orthanc_db:
    driver: local
