# ─────────────────────────────────────────────────────────────────────────────
# nginx-init.conf  –  Phase 1 (HTTP only, used during certbot certificate issuance)
# Once certs are obtained, deploy.sh switches to nginx.conf and reloads nginx.
# ─────────────────────────────────────────────────────────────────────────────

# HIS – HTTP only (certbot challenge + basic proxy)
server {
    listen 80;
    server_name ~^his-.*\.nip\.io$;

    # ACME challenge files written by certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://his:3002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Orthanc – HTTP only (certbot challenge + basic proxy)
server {
    listen 80;
    server_name ~^orthanc-.*\.nip\.io$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://orthanc:8042;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
    }
}
