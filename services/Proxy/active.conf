# ─────────────────────────────────────────────────────────────────────────────
# active.conf  –  Default HTTP-only config (ships in repo, replaced by deploy.sh)
#
# This file is committed as a copy of nginx-init.conf so that the stack can
# start on a fresh EC2 without SSL errors.
# deploy.sh replaces this file with nginx.conf (HTTPS) after certs are obtained.
# ─────────────────────────────────────────────────────────────────────────────

# HIS – HTTP only
server {
    listen 80;
    server_name ~^his-.*\.nip\.io$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://his:3002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Orthanc – HTTP only
server {
    listen 80;
    server_name ~^orthanc-.*\.nip\.io$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://orthanc:8042;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
    }
}
